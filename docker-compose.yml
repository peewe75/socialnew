version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: news-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news_automation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/news_automation
      PORT: 3001
      NODE_ENV: production
      AI_PROVIDER: openrouter
      AI_API_KEY: ${AI_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      BLOTATO_API_KEY: ${BLOTATO_API_KEY}
      AVATAR_HYGEN_API_KEY: demo
      APPROVAL_WEBHOOK_URL: ${APPROVAL_WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/public:/app/public
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      REACT_APP_ENVIRONMENT: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # n8n Workflows
  n8n:
    image: n8nio/n8n:latest
    container_name: news-n8n
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: n8n
      DB_USER: postgres
      DB_PASSWORD: postgres
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-password}
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:

networks:
  default:
    name: news-automation-network